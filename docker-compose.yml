services:
  database:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - seniorlove-network
    volumes:
      - seniorlove-volume:/var/lib/postgresql
    ports:
      - "${DATABASE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      SIRENE_API_TOKEN: ${SIRENE_API_TOKEN}
    volumes:
      - ./secrets/vision-key.json:/app/secrets/vision-key.json:ro
    networks:
      - seniorlove-network
    ports:
      - "${API_PORT}:3000"
    depends_on:
      database:
        condition: service_healthy

  adminer:
    image: adminer:5
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - seniorlove-network
    depends_on:
      - database

volumes:
  seniorlove-volume:

networks:
  seniorlove-network:
